name: .NET Build and Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore Ecommerce.slnx

      - name: Build
        run: dotnet build Ecommerce.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test Ecommerce.slnx --no-build --configuration Release --verbosity normal
